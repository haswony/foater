[build]
builder = "NIXPACKS"

[phases.setup]
nixPkgs = ["php", "phpExtensions.sqlite3", "phpExtensions.pdo_sqlite", "phpExtensions.mbstring", "phpExtensions.curl", "phpExtensions.session"]

[phases.build]
cmds = ["mkdir -p database", "chmod 755 database"]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"

